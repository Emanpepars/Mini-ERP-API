<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini ERP Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-6 9 6v11a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/>
            </svg>
          </div>
          <div>
            <h1>Mini ERP</h1>
            <p class="brand-sub">Users · Products · Orders · Invoices</p>
          </div>
        </div>

        <div class="header-actions">
          <div class="status-dot">
            <span class="dot" id="apiStatusDot"></span>
            <span id="apiStatusText">Connecting…</span>
          </div>
          <button class="ghost-btn" onclick="refreshAll()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>
            </svg>
            Refresh
          </button>
        </div>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Users</div>
        <div class="stat-value" id="statUsers">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Products</div>
        <div class="stat-value" id="statProducts">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Orders</div>
        <div class="stat-value" id="statOrders">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmed</div>
        <div class="stat-value" id="statConfirmed">—</div>
      </div>
    </div>

    <main>
      <section class="card" data-card="users">
        <div class="card-head">
          <h2>Users</h2>
          <button class="icon-btn" onclick="getUsers()" title="Reload users" aria-label="Reload users">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>
            </svg>
          </button>
        </div>

        <form class="form" onsubmit="event.preventDefault(); createUser();">
          <div class="field">
            <label for="userName">Name</label>
            <input type="text" id="userName" placeholder="e.g. Jane Doe" autocomplete="off" />
          </div>
          <div class="field">
            <label for="userEmail">Email</label>
            <input type="email" id="userEmail" placeholder="jane@example.com" autocomplete="off" />
          </div>
          <button type="submit" class="primary-btn" id="createUserBtn">
            <span class="btn-label">Add User</span>
          </button>
        </form>

        <div class="list-head">
          <span class="list-title">All users</span>
          <span class="badge" id="usersCount">0</span>
        </div>
        <div id="usersList" class="list"></div>
      </section>

      <section class="card" data-card="products">
        <div class="card-head">
          <h2>Products</h2>
          <button class="icon-btn" onclick="getProducts()" title="Reload products" aria-label="Reload products">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>
            </svg>
          </button>
        </div>

        <form class="form" onsubmit="event.preventDefault(); createProduct();">
          <div class="field">
            <label for="productName">Product name</label>
            <input type="text" id="productName" placeholder="e.g. Wireless Mouse" autocomplete="off" />
          </div>
          <div class="row">
            <div class="field">
              <label for="productPrice">Price</label>
              <input type="number" id="productPrice" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="field">
              <label for="productStock">Stock</label>
              <input type="number" id="productStock" placeholder="0" min="0" />
            </div>
          </div>
          <button type="submit" class="primary-btn" id="createProductBtn">
            <span class="btn-label">Add Product</span>
          </button>
        </form>

        <div class="list-head">
          <span class="list-title">Inventory</span>
          <span class="badge" id="productsCount">0</span>
        </div>
        <div id="productsList" class="list"></div>
      </section>

      <section class="card" data-card="orders">
        <div class="card-head">
          <h2>Orders</h2>
          <button class="icon-btn" onclick="getOrders()" title="Reload orders" aria-label="Reload orders">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/>
            </svg>
          </button>
        </div>

        <form class="form" onsubmit="event.preventDefault(); createOrder();">
          <div class="row">
            <div class="field">
              <label for="orderUserId">User ID</label>
              <input type="number" id="orderUserId" placeholder="1" min="1" />
            </div>
            <div class="field">
              <label for="orderProductId">Product ID</label>
              <input type="number" id="orderProductId" placeholder="1" min="1" />
            </div>
          </div>
          <div class="field">
            <label for="orderQuantity">Quantity</label>
            <input type="number" id="orderQuantity" placeholder="1" min="1" />
          </div>
          <button type="submit" class="primary-btn" id="createOrderBtn">
            <span class="btn-label">Create Order</span>
          </button>
        </form>

        <div class="list-head">
          <span class="list-title">All orders</span>
          <span class="badge" id="ordersCount">0</span>
        </div>
        <div id="ordersList" class="list"></div>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <div id="modalRoot" class="modal-root" aria-hidden="true">
      <div class="modal-backdrop" onclick="closeModal()"></div>
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h3 id="modalTitle">Invoice</h3>
          <button class="icon-btn" onclick="closeModal()" aria-label="Close">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
